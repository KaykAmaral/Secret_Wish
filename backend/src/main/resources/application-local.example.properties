# Copy this file to application-local.properties and set real local values.

DB_URL=jdbc:mysql://localhost:3306/secret_wish
DB_USERNAME=root
DB_PASSWORD=1234
JPA_DDL_AUTO=validate
FLYWAY_ENABLED=true
FLYWAY_BASELINE_ON_MIGRATE=true

JWT_SECRET=replace-with-a-long-local-secret
DEV_AUTH_ENABLED=true
AUTH_COOKIE_SECURE=false
AUTH_COOKIE_SAME_SITE=Lax
FRONTEND_ORIGIN=http://localhost:5173
FRONTEND_ORIGINS=http://localhost:5173
SWAGGER_ENABLED=true

GOOGLE_CLIENT_ID=replace-with-google-client-id
GOOGLE_CLIENT_SECRET=replace-with-google-client-secret
GOOGLE_REDIRECT_URI={baseUrl}/login/oauth2/code/{registrationId}

MAIL_ENABLED=false
MAIL_USERNAME=your-app-gmail@gmail.com
MAIL_PASSWORD=your-gmail-app-password

# Use any non-empty placeholder if you only need the app to start locally.
AI_ENABLED=false
GROQ_API_KEY=local-placeholder-groq-key
GROQ_BASE_URL=https://api.groq.com/openai
GROQ_AI_MODEL=llama-3.3-70b-versatile
