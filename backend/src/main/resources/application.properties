# Database (H2 File-based for persistence during dev)
spring.datasource.url=jdbc:h2:file:./data/secret_wish;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway (Disabled for H2)
spring.flyway.enabled=false

# Frontend
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:5173}
app.frontend.origins=${FRONTEND_ORIGINS:${app.frontend.origin}}

# Auth cookie
app.auth.cookie-secure=${AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}

# Development auth shortcut. 
app.dev-auth.enabled=true

# JWT
app.jwt.secret=${JWT_SECRET:local-development-secret-change-before-production}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Security limits
app.security.auth-rate-limit.login-max-attempts=${AUTH_RATE_LIMIT_LOGIN_MAX_ATTEMPTS:5}
app.security.auth-rate-limit.register-max-attempts=${AUTH_RATE_LIMIT_REGISTER_MAX_ATTEMPTS:3}
app.security.auth-rate-limit.window-minutes=${AUTH_RATE_LIMIT_WINDOW_MINUTES:15}

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:placeholder-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:placeholder-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

# Mail
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OpenAI
app.ai.enabled=false
spring.ai.openai.api-key=sk-dummy-key-placeholder-for-startup-only

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
