# Database (H2 File-based for persistence during dev)
spring.datasource.url=jdbc:h2:file:./data/secret_wish;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

# Flyway (Disabled for H2)
spring.flyway.enabled=false

# Frontend
app.frontend.origin=http://localhost:5173
app.frontend.origins=http://localhost:5173

# Auth cookie
app.auth.cookie-secure=false
app.auth.cookie-same-site=Lax

# Development auth shortcut. 
app.dev-auth.enabled=true

# JWT
app.jwt.secret=local-development-secret-change-before-production
app.jwt.expiration-minutes=60

# Google OAuth2 (Placeholders)
spring.security.oauth2.client.registration.google.client-id=placeholder-id
spring.security.oauth2.client.registration.google.client-secret=placeholder-secret
spring.security.oauth2.client.registration.google.scope=openid,email,profile
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# Mail
app.mail.enabled=false
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OpenAI
app.ai.enabled=false
spring.ai.openai.api-key=placeholder-key

# Swagger / OpenAPI
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
