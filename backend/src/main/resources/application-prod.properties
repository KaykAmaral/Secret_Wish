# Production safety defaults. Override secrets and datasource values with environment variables.
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.flyway.enabled=true

app.dev-auth.enabled=false
app.auth.cookie-secure=true
app.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
app.frontend.origin=${FRONTEND_ORIGIN}
app.jwt.secret=${JWT_SECRET}

spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}

app.mail.enabled=${MAIL_ENABLED:false}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}

app.ai.enabled=${AI_ENABLED:false}
spring.ai.openai.api-key=${OPENAI_API_KEY:}

springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
