# Database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/secret_wish}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:1234}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.open-in-view=false

# Flyway will be enabled after the schema is stable.
spring.flyway.enabled=${FLYWAY_ENABLED:false}

# Frontend
app.frontend.origin=${FRONTEND_ORIGIN:http://localhost:3000}

# Development auth shortcut. Disable before production.
app.dev-auth.enabled=${DEV_AUTH_ENABLED:true}

# JWT
app.jwt.secret=${JWT_SECRET:local-development-secret-change-before-production}
app.jwt.expiration-minutes=60

# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:local-placeholder-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:local-placeholder-client-secret}
spring.security.oauth2.client.registration.google.scope=openid,email,profile

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# OpenAI
spring.ai.openai.api-key=${OPENAI_API_KEY:local-placeholder-openai-key}

# Swagger / OpenAPI
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
